---
- name: Install Nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: yes

- name: Install Node.js 18
  ansible.builtin.shell: |
    curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
    apt-get install -y nodejs
  args:
    creates: /usr/bin/node

- name: Install git
  ansible.builtin.apt:
    name: git
    state: present

- name: Clone app repo
  ansible.builtin.git:
    repo: "{{ app_repo }}"
    dest: "{{ app_dir }}"
    version: main
    force: yes

- name: Install frontend dependencies
  ansible.builtin.shell: |
    cd {{ app_dir }}/client
    npm install
  args:
    creates: "{{ app_dir }}/client/node_modules"

- name: Build React frontend
  ansible.builtin.shell: |
    cd {{ app_dir }}/client
    npm run build
  environment:
    CI: "false"
  args:
    creates: "{{ app_dir }}/client/build"

- name: Deploy Nginx config
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/myapp
    mode: '0644'
  notify: reload nginx

- name: Enable site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/myapp
    dest: /etc/nginx/sites-enabled/myapp
    state: link
  notify: reload nginx

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Ensure nginx is started and enabled
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: yes
