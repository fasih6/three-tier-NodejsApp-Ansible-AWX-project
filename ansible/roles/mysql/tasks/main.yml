---
- name: Install MySQL server
  ansible.builtin.apt:
    name:
      - mysql-server
      - python3-pymysql
    state: present
    update_cache: yes

- name: Start and enable MySQL
  ansible.builtin.systemd:
    name: mysql
    state: started
    enabled: yes

- name: Set MySQL root password via shell
  ansible.builtin.shell: |
    mysql -u root <<-EOSQL
    ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY '{{ vault_mysql_root_password }}';
    FLUSH PRIVILEGES;
    EOSQL
  ignore_errors: yes

- name: Copy init.sql to server
  ansible.builtin.template:
    src: init.sql.j2
    dest: /tmp/init.sql
    mode: '0644'

- name: Import init.sql schema
  ansible.builtin.shell: >
    mysql -u root -p{{ vault_mysql_root_password }} < /tmp/init.sql
  ignore_errors: yes

- name: Allow root remote access
  ansible.builtin.shell: |
    mysql -u root -p{{ vault_mysql_root_password }} <<-EOSQL
    CREATE USER IF NOT EXISTS 'root'@'%' IDENTIFIED WITH mysql_native_password BY '{{ vault_mysql_root_password }}';
    GRANT ALL PRIVILEGES ON *.* TO 'root'@'%' WITH GRANT OPTION;
    FLUSH PRIVILEGES;
    EOSQL
